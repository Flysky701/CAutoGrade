server {
    charset utf-8;
    listen 80;
    server_name localhost;

    client_max_body_size 20M;

    # Frontend static files
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # API proxy to Spring Boot backend
    location /api/ {
        proxy_pass http://backend:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Swagger / Knife4j docs
    location /doc.html {
        proxy_pass http://backend:8080/doc.html;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /v3/ {
        proxy_pass http://backend:8080/v3/;
        proxy_set_header Host $host;
    }
    location /swagger-resources {
        proxy_pass http://backend:8080/swagger-resources;
        proxy_set_header Host $host;
    }
    location /webjars/ {
        proxy_pass http://backend:8080/webjars/;
        proxy_set_header Host $host;
    }
}
