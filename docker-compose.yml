services:
  mysql:
    image: mysql:8.0
    container_name: autograding-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-autograding}
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
      - mysql-data:/var/lib/mysql
    command:
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci

  redis:
    image: redis:7.0-alpine
    container_name: autograding-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf
      - redis-data:/data
    command: redis-server /usr/local/etc/redis/redis.conf

  chromadb:
    image: chromadb/chroma:latest
    container_name: autograding-chromadb
    restart: always
    ports:
      - "8001:8000"
    volumes:
      - chroma-data:/chroma/chroma
    environment:
      IS_PERSISTENT: "TRUE"
      ANONYMIZED_TELEMETRY: "FALSE"

  backend:
    build:
      context: ./backend
    container_name: autograding-backend
    restart: always
    ports:
      - "8080:8080"
    volumes:
      - ./backend/target/backend-1.0.0-SNAPSHOT.jar:/app/app.jar
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      SPRING_PROFILES_ACTIVE: prod
    depends_on:
      - mysql
      - redis

  grading-worker:
    build:
      context: ./grading-engine
    container_name: autograding-grading-worker
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./grading-engine:/app
      - hf-cache:/app/.cache/huggingface
    environment:
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      CELERY_BROKER_URL: redis://:autograding2026@redis:6379/1
      CHROMA_HOST: chromadb
      CHROMA_PORT: 8000
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      HF_ENDPOINT: https://hf-mirror.com
    depends_on:
      - redis
      - chromadb
      - mysql

  nginx:
    image: nginx:alpine
    container_name: autograding-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/dist:/usr/share/nginx/html
    depends_on:
      - backend

volumes:
  mysql-data:
  redis-data:
  chroma-data:
  hf-cache:
